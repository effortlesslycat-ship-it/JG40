<!-- ===========================================================
     FOOTER JS BOOTSTRAP
     Footer.html is injected via innerHTML, so <script> tags here
     do NOT run. This hidden <img onload> is an inline handler, which
     DOES fire through innerHTML (same mechanism as the logo onerror
     above). It appends jg-footer-init.js as a real script element,
     which runs - loading Google Analytics + the return-to-top button.
     CHW
=========================================================== -->
<img src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="
     alt="" aria-hidden="true"
     style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none"
     onload="if(!window.__jgFooterBoot){window.__jgFooterBoot=1;var s=document.createElement('script');s.src='/jg-footer-init.js?v=1';document.head.appendChild(s);}this.remove();">
