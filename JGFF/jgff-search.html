<style>
/* == JGFF Search page styles -- CHW ========================
   =========================================================== */

/* -- Page title band --------------------------------------- */
.page-title-band {
    background-color: #09497a;
    padding: 44px 50px;
    text-align: center;
}
body.dark-mode .page-title-band { background-color: #0d2a45; }
.page-title-band h1 {
    margin: 0 0 10px 0;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 2.25rem;
    font-weight: normal;
    line-height: 1.15;
    color: #ffffff;
}
.page-title-band p.hero-subtitle {
    margin: 0 auto;
    font-size: 0.9375rem;
    color: rgba(255,255,255,0.85);
    max-width: 560px;
    line-height: 1.6;
}

/* -- Ecru content wrap ------------------------------------- */
.jgff-ecru-wrap {
    background-color: var(--ecru);
    padding: 3rem 2rem;
    flex: 1;
}
.jgff-ecru-inner {
    max-width: 1100px;
    margin: 0 auto;
}

/* -- 70/30 grid -------------------------------------------- */
.jgff-grid {
    display: grid;
    grid-template-columns: minmax(0, 7fr) minmax(0, 3fr);
    gap: 28px;
    align-items: start;
}

/* -- Search card ------------------------------------------- */
.jgff-search-card {
    background-color: var(--white);
    border: 1px solid #d1caba;
    border-radius: 8px;
    padding: 22px 24px;
}
body.dark-mode .jgff-search-card {
    background-color: #1e1e1e;
    border-color: #333;
}

/* -- Card header: title left, tips button right ------------ */
.jg-search-card__header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}
.jg-search-card__header h2 {
    font-size: 1.125rem;
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: bold;
    color: var(--navy);
    margin: 0;
}
body.dark-mode .jg-search-card__header h2 { color: #e0e0e0; }
.jg-search-card__rule {
    border: none;
    border-top: 1px solid #d1caba;
    margin: 0 0 16px 0;
}
body.dark-mode .jg-search-card__rule { border-top-color: #333; }

/* -- Tips link button (matches global search page) --------- */
.jg-tips-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--sage);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.8125rem;
    font-weight: bold;
    color: var(--sage);
    cursor: pointer;
    font-family: inherit;
    transition: background-color 0.15s, color 0.15s;
    white-space: nowrap;
}
.jg-tips-link:hover,
.jg-tips-link[aria-expanded="true"] {
    background-color: var(--sage);
    color: #ffffff;
}
body.dark-mode .jg-tips-link { border-color: #a8b361; color: #a8b361; }
body.dark-mode .jg-tips-link:hover,
body.dark-mode .jg-tips-link[aria-expanded="true"] {
    background-color: #a8b361;
    color: #121212;
}
.jg-tips-link__icon { width: 18px; height: 18px; vertical-align: middle; }

/* -- Tips panel -------------------------------------------- */
.jg-tips-card-panel {
    display: none;
    background-color: var(--cream);
    border-left: 4px solid var(--sage);
    border-radius: 0 6px 6px 0;
    padding: 16px 18px;
    margin-bottom: 16px;
    font-size: 0.875rem;
    line-height: 1.6;
    color: var(--charcoal);
}
.jg-tips-card-panel.open { display: block; }
body.dark-mode .jg-tips-card-panel {
    background-color: #1a1a1a;
    border-left-color: #a8b361;
    color: #a0a0a0;
}
.gs-tips-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
}
.gs-tips-grid div { font-size: 0.8125rem; line-height: 1.5; }
.gs-tips-grid em  { color: #666; font-style: italic; }
body.dark-mode .gs-tips-grid em { color: #888; }
.jg-tips-panel__footer {
    border-top: 1px solid #d1caba;
    padding-top: 8px;
    margin-top: 4px;
    text-align: right;
}
body.dark-mode .jg-tips-panel__footer { border-top-color: #333; }
.jg-tips-panel__footer a {
    font-size: 0.75rem;
    color: #09497a;
    font-weight: bold;
    font-style: italic;
    text-decoration: underline;
}
.jg-tips-panel__footer a:hover { color: var(--sage); }
body.dark-mode .jg-tips-panel__footer a { color: #a8b361; }

/* -- Form field rows --------------------------------------- */
.jgff-field-group { margin-bottom: 14px; }
.jgff-field-group label {
    display: block;
    font-size: 0.8125rem;
    font-weight: bold;
    color: var(--navy);
    margin-bottom: 5px;
}
body.dark-mode .jgff-field-group label { color: #e0e0e0; }
.jgff-input-pair {
    display: flex;
    gap: 8px;
}
.jgff-input-pair select,
.jgff-input-pair input[type="text"],
.jgff-field-group select {
    padding: 7px 10px;
    border: 1px solid #c5bca8;
    border-radius: 5px;
    font-size: 0.9375rem;
    font-family: inherit;
    background-color: var(--white);
    color: var(--charcoal);
    transition: border-color 0.2s, box-shadow 0.2s;
}
body.dark-mode .jgff-input-pair select,
body.dark-mode .jgff-input-pair input[type="text"],
body.dark-mode .jgff-field-group select {
    background-color: #2a2a2a;
    color: #e0e0e0;
    border-color: #444;
}
.jgff-input-pair select:focus,
.jgff-input-pair input[type="text"]:focus,
.jgff-field-group select:focus {
    border-color: var(--sage);
    outline: none;
    box-shadow: 0 0 0 2px rgba(147,155,81,0.25);
}
.jgff-type-select { flex: 0 0 200px; }
.jgff-text-input  { flex: 1; }
.jgff-country-select { width: 100%; }

/* -- Synonym toggle ---------------------------------------- */
.jgff-synonym-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    font-size: 0.875rem;
    color: var(--charcoal);
}
body.dark-mode .jgff-synonym-row { color: #a0a0a0; }
.jgff-synonym-row input[type="checkbox"] {
    width: 15px;
    height: 15px;
    cursor: pointer;
}

/* -- Date filter ------------------------------------------- */
.jgff-date-group { margin-bottom: 18px; }
.jgff-date-group label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.875rem;
    color: var(--charcoal);
    cursor: pointer;
    margin-bottom: 6px;
}
body.dark-mode .jgff-date-group label { color: #a0a0a0; }
.jgff-date-group input[type="radio"] {
    width: 15px;
    height: 15px;
    cursor: pointer;
}
.jgff-date-sub {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-left: 24px;
    margin-top: 4px;
}
.jgff-date-sub select {
    padding: 5px 8px;
    border: 1px solid #c5bca8;
    border-radius: 4px;
    font-size: 0.875rem;
    font-family: inherit;
    background-color: var(--white);
    color: var(--charcoal);
}
body.dark-mode .jgff-date-sub select {
    background-color: #2a2a2a;
    color: #e0e0e0;
    border-color: #444;
}
.jgff-date-sub select:disabled { opacity: 0.4; cursor: not-allowed; }

/* -- Submit button ----------------------------------------- */
.jgff-submit-btn {
    background-color: #09497a;
    color: #ffffff;
    border: none;
    border-radius: 5px;
    padding: 10px 32px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.5px;
    transition: filter 0.2s;
}
.jgff-submit-btn:hover { filter: brightness(1.1); }
.jgff-submit-btn:focus {
    outline: 3px solid var(--sage);
    outline-offset: 2px;
}
body.dark-mode .jgff-submit-btn { background-color: #0d2a45; }

/* -- Sidebar ----------------------------------------------- */
.jgff-sidebar {
    position: sticky;
    top: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* -- Responsive -------------------------------------------- */
@media (max-width: 768px) {
    .jgff-grid { grid-template-columns: 1fr; }
    .jgff-sidebar { position: static; }
    .page-title-band { padding: 32px 24px; }
    .page-title-band h1 { font-size: 1.75rem; }
    .jgff-ecru-wrap { padding: 2rem 1rem; }
    .jgff-input-pair { flex-direction: column; }
    .jgff-type-select { flex: none; width: 100%; }
    .gs-tips-grid { grid-template-columns: 1fr; }
}
</style>

<script src="/jg/scripts/jg-tips.js"></script>
<script>
/* -- Component loader -- CHW -------------------------------- */
function loadComponent(id, file) {
    return fetch(file)
        .then(function(r) {
            if (!r.ok) { throw new Error('Could not load ' + file); }
            return r.text();
        })
        .then(function(html) {
            document.getElementById(id).innerHTML = html;
        })
        .catch(function(err) { console.warn(err); });
}

Promise.all([
    loadComponent('site-header', '/Header_NavBar.html'),
    loadComponent('site-footer', '/Footer.html'),
    loadComponent('jgff-subnav', '/jgff/jgff-subnav.html')
]).then(function() {
    initJgffSubnav();
    /* Re-init tips in case script ran before subnav injected */
    if (typeof initJgTips === 'function') { initJgTips(); }
    /* Nav keyboard accessibility */
    document.querySelectorAll('.jg-nav .dropbtn').forEach(function(btn) {
        btn.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                var expanded = this.getAttribute('aria-expanded') === 'true';
                this.setAttribute('aria-expanded', String(!expanded));
                var menu = document.getElementById(this.getAttribute('aria-controls'));
                if (menu) { menu.style.display = expanded ? 'none' : 'block'; }
            }
            if (e.key === 'Escape') {
                this.setAttribute('aria-expanded', 'false');
                var menu = document.getElementById(this.getAttribute('aria-controls'));
                if (menu) { menu.style.display = 'none'; }
            }
        });
    });
});

/* -- Preserve legacy JS surface from jgffweb.asp ----------- */

/* OnChange handler for Town search type -- enables/disables synonyms */
function TownSel(choice) {
    var searchtype = choice.value;
    var syn_check  = document.getElementById('synonym');
    var syn_quest  = document.getElementById('TownSyn');
    if (searchtype === 'exact') {
        syn_check.disabled = false;
        syn_check.checked  = true;
        syn_quest.style.opacity = '1.00';
    } else {
        syn_check.disabled = true;
        syn_check.checked  = false;
        syn_quest.style.opacity = '0.33';
    }
    return true;
}

/* OnClick handler for date filter radios */
function Sensitize(val) {
    document.f.Months.disabled = val;
    document.f.Years.disabled  = val;
}

/* Run HighlightForm init on load */
window.addEventListener('load', function() {
    if (typeof initEvents === 'function') { initEvents(); }
    /* Set initial synonym/date state */
    var opt = document.getElementById('TownSearchType');
    if (opt) { TownSel(opt); }
    Sensitize(1);
});
</script>

</body>
</html>
