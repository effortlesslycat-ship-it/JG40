<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JewishGen Support Center</title>
<meta name="description" content="Help on using JewishGen services: registration and login, mailing lists, the JewishGen Family Finder (JGFF), contributions, and contacting JewishGen.">

<!-- 1. Bootstrap -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<!-- 2. JewishGen Global Design System -->
<link rel="stylesheet" href="/jg-global.css">
<!-- 3. Page-specific styles -->
<link rel="stylesheet" href="/jg-support.css?v=3">
</head>
<body>

<!-- =========================================================
     HEADER + NAV
========================================================= -->
<div id="site-header"></div>

<!-- =========================================================
     PAGE TITLE BAND
     Short strings kept inline so they switch instantly with no
     fetch delay. Heavy accordion content is fetched per-language.
     (No hero-subtitle: legacy pages had none, and the 2004-era
     translations have no subtitle copy to port -- nothing is
     machine-translated here. Add per-language subtitles later
     if desired.)
========================================================= -->
<div class="page-title-band" role="banner">
    <span class="tagline" data-lang="en">Support Center</span>
    <span class="tagline hidden" data-lang="es">Soporte</span>
    <span class="tagline hidden" data-lang="fr">D&eacute;pannage</span>
    <span class="tagline hidden" data-lang="he">&#1502;&#1512;&#1499;&#1494; &#1492;&#1514;&#1502;&#1497;&#1499;&#1492;</span>

    <h1 data-lang="en">JewishGen Support Center</h1>
    <h1 class="hidden" data-lang="es">Soporte JewishGen en espa&ntilde;ol</h1>
    <h1 class="hidden" data-lang="fr">Centre de d&eacute;pannage de JewishGen</h1>
    <h1 class="hidden" data-lang="he">JewishGen &#1502;&#1512;&#1499;&#1494; &#1492;&#1514;&#1502;&#1497;&#1499;&#1492; &#1513;&#1500;</h1>
</div>

<!-- =========================================================
     MAIN CONTENT
========================================================= -->
<div class="support-ecru-wrap">
    <div class="support-ecru-inner">
        <div class="support-grid">

            <!-- LEFT: fetched support content lives here ----- -->
            <div id="support-content-area" dir="ltr">
                <p class="support-loading">Loading&hellip;</p>
            </div>

            <!-- RIGHT: sidebar (direct grid child -- keeps sticky + 70/30) -->
            <aside class="support-sidebar" aria-label="Support navigation and language">
                <div id="support-subnav" data-support-page="support"></div>
            </aside>

        </div><!-- /support-grid -->
    </div><!-- /support-ecru-inner -->
</div><!-- /support-ecru-wrap -->

<!-- =========================================================
     FOOTER
========================================================= -->
<div id="site-footer"></div>

<!-- =========================================================
     SCRIPTS
========================================================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* -- Component loader -- CHW -------------------------------- */
function loadComponent(id, file) {
    return fetch(file)
        .then(function(r) {
            if (!r.ok) throw new Error('Could not load ' + file);
            return r.text();
        })
        .then(function(html) {
            document.getElementById(id).innerHTML = html;
        })
        .catch(function(err) { console.warn(err); });
}

/* -- Supported languages ----------------------------------- */
var SUPPORT_LANGS = ['en', 'es', 'fr', 'he'];
var langCache   = {};
var currentLang = 'en';

/* -- Language loader -- CHW --------------------------------
   Fetches support-content-{lang}.html, caches per session,
   re-binds accordions after every injection (new DOM nodes
   need fresh listeners), then resolves any pending #qX anchor.
----------------------------------------------------------- */
function loadLanguage(lang, pendingHash) {
    var area = document.getElementById('support-content-area');

    /* RTL for Hebrew */
    area.setAttribute('dir', lang === 'he' ? 'rtl' : 'ltr');
    document.documentElement.setAttribute('lang', lang);

    /* Switch title-band strings (inline, so instant) */
    document.querySelectorAll('.page-title-band [data-lang]').forEach(function(el) {
        el.classList.toggle('hidden', el.getAttribute('data-lang') !== lang);
    });

    /* Update language-button active state + document title */
    document.querySelectorAll('.lang-toggle').forEach(function(btn) {
        var isActive = btn.getAttribute('data-target-lang') === lang;
        btn.classList.toggle('active', isActive);
        if (isActive) {
            var t = btn.getAttribute('data-page-title');
            if (t) document.title = t;
        }
    });

    /* Cached -> inject immediately */
    if (langCache[lang]) {
        area.innerHTML = langCache[lang];
        initAccordions();
        resolveHash(pendingHash);
        return;
    }

    area.innerHTML = '<p class="support-loading">Loading&hellip;</p>';

    fetch('support-content-' + lang + '.html')
        .then(function(r) {
            if (!r.ok) throw new Error('Fragment not found: support-content-' + lang + '.html');
            return r.text();
        })
        .then(function(html) {
            langCache[lang] = html;
            area.innerHTML = html;
            initAccordions();
            resolveHash(pendingHash);
        })
        .catch(function(err) {
            console.warn(err);
            area.innerHTML = '<p class="support-loading">Content unavailable. Please try again.</p>';
        });
}

/* -- Accordion open/close ---------------------------------- */
function openCollapsible(trigger) {
    var body = trigger.nextElementSibling;
    trigger.classList.add('open');
    trigger.setAttribute('aria-expanded', 'true');
    if (body) body.classList.add('open');
}
function toggleCollapsible(trigger) {
    var body = trigger.nextElementSibling;
    var isOpen = trigger.classList.contains('open');
    trigger.classList.toggle('open', !isOpen);
    trigger.setAttribute('aria-expanded', String(!isOpen));
    if (body) body.classList.toggle('open', !isOpen);
}

function initAccordions() {
    /* Re-bind triggers after injection (old listeners are
       discarded with the replaced innerHTML). */
    document.querySelectorAll('#support-content-area .jg-collapsible-trigger').forEach(function(trigger) {
        trigger.addEventListener('click', function() { toggleCollapsible(this); });
    });

    /* Intercept internal cross-reference links ("See Question X"):
       #q1   .. #q5   -> section anchors: just scroll
       #q1.6 .. etc.  -> a specific question: open it, then scroll */
    document.querySelectorAll('#support-content-area a[href^="#q"]').forEach(function(link) {
        link.addEventListener('click', function(e) {
            var id = this.getAttribute('href').slice(1);
            var target = document.getElementById(id);
            if (!target) return; /* allow default if not found */
            e.preventDefault();
            scrollToTarget(target);
            if (history.replaceState) history.replaceState(null, '', '#' + id);
        });
    });
}

/* -- Hash resolution (deep links: /support/#q1.6) ---------- */
function resolveHash(hash) {
    if (!hash) return;
    var id = hash.charAt(0) === '#' ? hash.slice(1) : hash;
    /* getElementById (not querySelector) -- ids contain dots */
    var target = document.getElementById(id);
    if (target) scrollToTarget(target);
}

function scrollToTarget(target) {
    /* If the target is a collapsible (id on the wrapper), open it */
    var trigger = target.querySelector(':scope > .jg-collapsible-trigger');
    if (trigger && !trigger.classList.contains('open')) openCollapsible(trigger);
    /* Let the open transition begin, then scroll */
    setTimeout(function() {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 60);
}

/* -- Boot -------------------------------------------------- */
var urlParams = new URLSearchParams(window.location.search);
var urlLang   = urlParams.get('lang');
if (urlLang && SUPPORT_LANGS.indexOf(urlLang) !== -1) currentLang = urlLang;
var bootHash  = window.location.hash || '';

Promise.all([
    loadComponent('site-header', '/Header_NavBar.html'),
    loadComponent('site-footer', '/Footer.html'),
    loadComponent('support-subnav', 'support-subnav.html')
]).then(function() {

    /* Language buttons live in the fetched subnav, so bind here */
    document.querySelectorAll('.lang-toggle').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var lang = this.getAttribute('data-target-lang');
            if (lang !== currentLang) {
                currentLang = lang;
                loadLanguage(lang);
            }
        });
    });

    /* Header nav keyboard accessibility (matches site pattern) */
    document.querySelectorAll('.jg-nav .dropbtn').forEach(function(btn) {
        btn.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                var expanded = this.getAttribute('aria-expanded') === 'true';
                this.setAttribute('aria-expanded', String(!expanded));
                var menu = document.getElementById(this.getAttribute('aria-controls'));
                if (menu) menu.style.display = expanded ? 'none' : 'block';
            }
            if (e.key === 'Escape') {
                this.setAttribute('aria-expanded', 'false');
                var menu = document.getElementById(this.getAttribute('aria-controls'));
                if (menu) menu.style.display = 'none';
            }
        });
    });

    /* Load the initial language, then resolve any inbound #qX.X */
    loadLanguage(currentLang, bootHash);

}).catch(function(err) { console.warn(err); });

/* Browser back/forward between in-page anchors */
window.addEventListener('hashchange', function() {
    resolveHash(window.location.hash);
});
</script>

</body>
</html>
