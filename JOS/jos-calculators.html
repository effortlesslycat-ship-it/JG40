<!DOCTYPE html>
<html lang="en" style="scroll-behavior: smooth;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculators &mdash; JewishGen</title>
    <meta name="description" content="JewishGen calculator tools for Soundex codes, Calendar Conversions, Jewish Festivals, and Hebrew Characters.">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    
    <link rel="stylesheet" href="/jg-global.css">
    
    <link rel="stylesheet" href="/JOS/jos-styles.css">

    <script src="https://stevemorse.org/census/dm.js"></script>
    <script src="https://stevemorse.org/census/dmlat.js"></script>
</head>
<body>

<div id="site-header"></div>

<div class="jos-page-band">
    <div class="jos-section-tag">Tools</div>
    <h1>JewishGen Calculators</h1>
</div>

<div id="jos-subnav"></div>

<main>
    <div class="jos-content">
        <div class="jos-inner">

            <div id="pane-soundex" class="jos-tab-pane active" role="tabpanel" aria-labelledby="tab-btn-soundex"></div>

            <div id="pane-calconv" class="jos-tab-pane" role="tabpanel" aria-labelledby="tab-btn-calconv"></div>

            <div id="pane-festivals" class="jos-tab-pane" role="tabpanel" aria-labelledby="tab-btn-festivals"></div>

            <div id="pane-hebrewchar" class="jos-tab-pane" role="tabpanel" aria-labelledby="tab-btn-hebrewchar"></div>

        </div>
    </div>
</main>

<div id="site-footer"></div>

<script>
    /* =========================================================
       1. SOUNDEX CALCULATION ENGINE
       ========================================================= */
    function soundexNARA(name) {
        name = name.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        if (!name) return '';
        
        const firstLetter = name[0].toUpperCase();
        const mappings = { 'BFPV': '1', 'CGJKQSXZ': '2', 'DT': '3', 'L': '4', 'MN': '5', 'R': '6' };
        
        const charToCode = char => {
            for (const key in mappings) { if (key.includes(char)) return mappings[key]; }
            return '';
        };

        const code = name.toUpperCase().split('').map(charToCode);
        const firstLetterCode = code.slice(1).filter((char, index) => char !== '' && char !== 'H' && char !== 'W' && char !== code[index]).join('');
        return (firstLetter + firstLetterCode + '0000').slice(0, 4);
    }

    function initSoundex() {
        const input = document.getElementById('soundex-word');
        const output = document.getElementById('soundex-result');
        
        if (!input || !output) return; // Failsafe

        input.addEventListener('input', function() {
            var val = this.value.trim();
            
            if (val.length) {
                var dmResult = typeof soundex === 'function' ? soundex(val) : "Script loading...";
                output.innerHTML = "<strong>NARA Soundex:</strong> " + soundexNARA(val) + "<br><strong>Daitch-Mokotoff:</strong> " + dmResult;
                output.hidden = false;
            } else {
                output.hidden = true;
            }
        });
    }

    /* =========================================================
       2. TAB SWITCHING LOGIC
       ========================================================= */
    function switchTab(tabId) {
        // Reset buttons
        document.querySelectorAll('.jos-nav button').forEach(function(btn) {
            btn.classList.remove('active');
            btn.setAttribute('aria-selected', 'false');
        });
        
        // Hide panes
        document.querySelectorAll('.jos-tab-pane').forEach(function(pane) {
            pane.classList.remove('active');
        });

        // Activate selected
        var targetBtn = document.getElementById('tab-btn-' + tabId);
        var targetPane = document.getElementById('pane-' + tabId);
        
        if (targetBtn && targetPane) {
            targetBtn.classList.add('active');
            targetBtn.setAttribute('aria-selected', 'true');
            targetPane.classList.add('active');
        }
    }

    /* =========================================================
       3. COMPONENT LOADER
       ========================================================= */
    function loadComponent(id, file) {
        return fetch(file).then(function(r) {
            if (!r.ok) throw new Error('Could not load ' + file);
            return r.text();
        }).then(function(html) {
            document.getElementById(id).innerHTML = html;
        }).catch(function(err) { console.warn(err); });
    }

    // Load everything when the page opens
    Promise.all([
        loadComponent('site-header', '/Header_NavBar.html'),
        loadComponent('site-footer', '/Footer.html'),
        loadComponent('jos-subnav', '/JOS/JOS_SubNav.html'),
        loadComponent('pane-soundex', '/JOS/JOS_Soundex.html')
    ]).then(function() {
        // Now that the HTML is loaded, turn on the Soundex tool
        initSoundex();

        // Standard JG40 dropdown keyboard accessibility
        document.querySelectorAll('.jg-nav .dropbtn, .main-nav .dropbtn').forEach(function(btn) {
            btn.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    var menu = this.nextElementSibling;
                    if (menu) menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
                }
                if (e.key === 'Escape') {
                    var menu = this.nextElementSibling;
                    if (menu) menu.style.display = 'none';
                }
            });
        });
    });
</script>

</body>
</html>
